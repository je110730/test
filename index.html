<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深海探索之旅</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="surface" class="scene">
        <h1 class="fade-in">深海探索之旅</h1>
        <p>向下滾動，潛入未知</p>
        <div class="scroll-indicator">↓</div>
    </section>

    <section id="twilight" class="scene">
        <h2 class="slide-in-left">微光層的生機</h2>
        <div class="interactive-fish" data-info="海龜：壽命可達80年">🐢</div>
    </section>

    <section id="midnight" class="scene">
        <div class="flashlight-overlay"></div>
        <h2>無光層的發光生物</h2>
        <div class="hidden-creature">💡 鮟鱇魚</div>
    </section>

    <script src="script.js"></script>
</body>
</html>
